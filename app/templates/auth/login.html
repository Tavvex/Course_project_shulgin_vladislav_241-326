{% extends "base.html" %}

{% block title %}Вход | Мошурова Полина{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-user-circle"></i>
                <h1>Вход в аккаунт</h1>
            </div>

            <form method="POST" class="auth-form">
                <div class="form-group">
                    <label for="username">Имя пользователя</label>
                    <input type="text" id="username" name="username" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Войти</button>
            </form>

            <div class="auth-footer">
                <p>Нет аккаунта? <a href="{{ url_for('auth.register') }}">Зарегистрироваться</a></p>
                <p><a href="{{ url_for('auth.forgot_password') }}">Забыли пароль?</a></p>
            </div>
        </div>
    </div>
</section>

<style>
.auth-section { padding: 80px 0; min-height: 60vh; display: flex; align-items: center; }
.auth-card { background: white; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); max-width: 420px; margin: 0 auto; padding: 40px; }
.auth-header { text-align: center; margin-bottom: 30px; }
.auth-header i { font-size: 3rem; color: #8a9b8c; margin-bottom: 12px; display: block; }
.auth-header h1 { font-size: 1.5rem; color: #333; }
.auth-form .form-group { margin-bottom: 20px; }
.auth-form label { display: block; margin-bottom: 6px; font-weight: 500; color: #555; }
.auth-form input { width: 100%; padding: 11px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; box-sizing: border-box; transition: border-color 0.2s; }
.auth-form input:focus { outline: none; border-color: #8a9b8c; }
.btn-block { width: 100%; }
.auth-footer { text-align: center; margin-top: 20px; color: #666; }
.auth-footer a { color: #8a9b8c; text-decoration: none; font-weight: 500; }
.auth-footer a:hover { text-decoration: underline; }
</style>
{% endblock %}
